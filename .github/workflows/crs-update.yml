name: CRS Update

on:
  schedule:
    # Mondays at 04:30 UTC
    - cron: '30 4 * * 1'
  workflow_dispatch:
    inputs:
      tag:
        description: 'CRS release tag to import (empty = latest)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  import:
    name: Import latest OWASP CRS release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Import CRS rules
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$REQUESTED_TAG" ]; then
            php bin/crs-import --tag="$REQUESTED_TAG"
          else
            php bin/crs-import
          fi

      - name: Read imported CRS version
        id: manifest
        run: |
          echo "version=$(php -r 'echo json_decode(file_get_contents("resources/rules/manifest.json"), true)["crsVersion"];')" >> "$GITHUB_OUTPUT"

      - name: Run tests against the imported rules
        run: |
          XDEBUG_MODE=off vendor/bin/phpunit --no-coverage

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: crs-update/${{ steps.manifest.outputs.version }}
          commit-message: 'Update OWASP CRS to ${{ steps.manifest.outputs.version }}'
          title: 'Update OWASP CRS to ${{ steps.manifest.outputs.version }}'
          body: |
            Automated import of the OWASP Core Rule Set release `${{ steps.manifest.outputs.version }}`.

            Generated by the scheduled `CRS Update` workflow via `bin/crs-import`.
            Review the regenerated files under `resources/rules/` before merging.
          add-paths: |
            resources/rules/
          delete-branch: true
